services:
  endpoint:
    build: 
      context: .
      dockerfile: DockerFile
    container_name: api-endpoint
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_HOST=redis:6379
      - MODEL_ENDPOINT=${MODEL_ENDPOINT:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    restart: unless-stopped